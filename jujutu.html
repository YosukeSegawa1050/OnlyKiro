<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>呪術廻戦 — 無量空処 vs 領域展開</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Noto+Sans+JP:wght@400;700&display=swap');
  :root {
    --gojo-color: #818cf8;
    --sukuna-color: #f87171;
  }
  body {
    background: #07070f;
    font-family: 'Noto Sans JP', sans-serif;
    overflow-x: hidden;
  }
  .title-font { font-family: 'Noto Serif JP', serif; }

  /* 背景演出 */
  .bg-cursed {
    background: radial-gradient(ellipse at 30% 50%, rgba(99,74,198,0.18) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 50%, rgba(220,38,38,0.15) 0%, transparent 60%),
                #07070f;
  }

  /* HPバー */
  .hp-bar { transition: width 0.5s cubic-bezier(.4,0,.2,1); }
  .mp-bar { transition: width 0.4s ease; }

  /* スキルカード */
  .skill-btn {
    position: relative;
    transition: all 0.2s;
    border: 1px solid rgba(255,255,255,0.1);
    overflow: hidden;
  }
  .skill-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.06), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .skill-btn:hover:not(:disabled)::before { opacity: 1; }
  .skill-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
  .skill-btn:active:not(:disabled) { transform: translateY(0); }
  .skill-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* キャラクター画像エリア */
  .char-glyph {
    font-size: 5rem;
    line-height: 1;
    filter: drop-shadow(0 0 20px currentColor);
  }
  .char-img {
    width: 80px;
    height: 80px;
    object-fit: cover;
    object-position: top center;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.1);
    filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
    transition: filter 0.3s;
  }
  .char-img.shield-active {
    filter: drop-shadow(0 0 14px #94a3b8) brightness(1.15);
  }
  .char-img-wrap {
    position: relative;
    width: 80px;
    height: 80px;
    flex-shrink: 0;
  }
  .shield-overlay {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    background: rgba(148,163,184,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .shield-overlay.visible { opacity: 1; }

  /* ダメージ数字アニメ */
  @keyframes dmgPop {
    0%   { transform: translateY(0) scale(1.4); opacity: 1; }
    80%  { transform: translateY(-50px) scale(1); opacity: 0.8; }
    100% { transform: translateY(-70px) scale(0.8); opacity: 0; }
  }
  .dmg-float {
    position: absolute;
    font-weight: 900;
    font-size: 2rem;
    pointer-events: none;
    animation: dmgPop 1s ease forwards;
    z-index: 50;
    white-space: nowrap;
  }

  /* ログエリア */
  @keyframes logIn {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .log-line { animation: logIn 0.25s ease forwards; }

  /* 領域展開フラッシュ */
  @keyframes domainFlash {
    0%,100% { opacity: 0; }
    20%,60% { opacity: 1; }
  }
  .domain-flash { animation: domainFlash 0.6s ease; }

  /* 勝敗オーバーレイ */
  @keyframes resultIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }
  .result-box { animation: resultIn 0.45s cubic-bezier(.34,1.56,.64,1) forwards; }

  /* MPアイコン */
  .mp-gem { display:inline-block; width:10px; height:10px; border-radius:50%; background:#818cf8; margin:0 1px; }
  .mp-gem.empty { background:#2a2a3e; }

  /* ターン表示 */
  @keyframes turnBounce {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.08); }
  }
  .turn-badge { animation: turnBounce 1.2s ease infinite; }
</style>
</head>
<body class="bg-cursed min-h-screen flex flex-col items-center justify-start py-6 px-3 gap-5">

</div>

<!-- 勝敗オーバーレイ -->

      もう一度
    </button>
  </div>
</div>

// ===== 描画 =====
function renderAll() {
  renderChar('gojo', state.player);
  renderChar('sukuna', state.cpu);
  renderSkills();
  renderTurnBadge();
}

function renderChar(id, ch) {
  const hpPct = Math.max(0, ch.hp / ch.maxHp * 100);
  document.getElementById(`${id}-hp-lbl`).textContent = `${Math.max(0,ch.hp)} / ${ch.maxHp}`;
  document.getElementById(`${id}-hp-bar`).style.width = hpPct + '%';
  // HPバー色変化
  const bar = document.getElementById(`${id}-hp-bar`);
  if (hpPct > 50) bar.className = `hp-bar h-3 rounded-full ${id==='gojo'?'bg-indigo-500':'bg-red-600'}`;
  else if (hpPct > 25) bar.className = 'hp-bar h-3 rounded-full bg-yellow-500';
  else bar.className = 'hp-bar h-3 rounded-full bg-red-400';

  document.getElementById(`${id}-mp-lbl`).textContent = `${ch.mp} / ${ch.maxMp}`;
  // MPジェム
  const gems = document.getElementById(`${id}-mp-gems`);
  gems.innerHTML = '';
  for (let i = 0; i < ch.maxMp; i++) {
    const g = document.createElement('div');
    g.style.cssText = `width:10px;height:10px;border-radius:50%;margin:0 1px;background:${i < ch.mp ? (id==='gojo'?'#818cf8':'#f87171') : '#2a2a3e'};transition:background 0.3s;`;
    gems.appendChild(g);
  }
  // シールドアイコン
  const glyph = document.getElementById(`${id}-glyph`);
  if (ch.shield) {
    glyph.textContent = id === 'gojo' ? '🛡️' : '🛡️';
    glyph.style.filter = 'drop-shadow(0 0 16px #94a3b8)';
  } else {
    if (id === 'gojo') {
      const charData = CHARACTERS[state.playerCharId] || CHARACTERS.gojo;
      glyph.textContent = charData.icon;
      glyph.style.filter = `drop-shadow(0 0 20px ${charData.glow})`;
    } else {
      glyph.textContent = '👹';
      glyph.style.filter = 'drop-shadow(0 0 20px #ef4444)';
    }
  }
}

function renderSkills() {
  const container = document.getElementById('skill-buttons');
  container.innerHTML = '';
  const sealed = state.player.domainCooldown > 0; // 術式封印中
  for (const sk of state.player.skills) {
    // 封印中はMP0の技しか使えない
    const canUse = state.player.mp >= sk.mp && state.phase === 'player' && !state.busy
      && (!sealed || sk.mp === 0);
    const btn = document.createElement('button');
    btn.className = `skill-btn rounded-xl p-3 text-left flex flex-col gap-1 bg-gradient-to-br ${sk.color}`;
    btn.disabled = !canUse;
    const sealedLabel = (sealed && sk.mp > 0) ? '<div class="text-xs text-orange-400 font-bold mt-0.5">🚫 術式封印中</div>' : '';
    btn.innerHTML = `
      <div class="flex items-center justify-between">
        <span class="text-base">${sk.icon}</span>
        <span class="text-xs font-bold ${sk.mp===0?'text-gray-400':'text-yellow-300'}">MP ${sk.mp}</span>
      </div>
      <div class="text-xs font-bold text-white leading-tight">${sk.name}</div>
      <div class="text-xs text-gray-400 leading-tight">${sk.desc}</div>
      ${sealedLabel}
    `;
    btn.addEventListener('click', () => playerAction(sk));
    container.appendChild(btn);
  }
}

function renderTurnBadge() {
  const badge = document.getElementById('turn-badge');
  badge.textContent = `ターン ${state.turn}`;
}

// ===== ログ =====
function addLog(msg, cls = 'text-gray-300') {
  const area = document.getElementById('log-area');
  const div = document.createElement('div');
  div.className = 'log-line ' + cls;
  div.textContent = msg;
  area.prepend(div);

// ===== ダメージ浮かび上がり =====
function showDamageFloat(targetId, text, color) {
  const area = document.getElementById(`${targetId}-area`);
  const el = document.createElement('div');
  el.className = 'dmg-float';
  el.style.color = color;
  el.style.left = '50%';
  el.style.top = '20px';
  el.style.transform = 'translateX(-50%)';
  el.textContent = text;
  area.style.position = 'relative';
  area.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

// ===== 領域展開演出 =====
function domainEffect(color, cb) {
  const flash = document.createElement('div');
  flash.className = 'domain-flash fixed inset-0 z-40 pointer-events-none';
  flash.style.background = color;
  document.body.appendChild(flash);
  setTimeout(() => { flash.remove(); cb && cb(); }, 650);
}

// ===== ダメージ計算 =====
function rollDamage(skill) {
  const [lo, hi] = skill.damage;
  return Math.floor(Math.random() * (hi - lo + 1)) + lo;
}

// ===== プレイヤーのアクション =====
function playerAction(skill) {
  if (state.busy || state.phase !== 'player') return;
  if (state.player.mp < skill.mp) return;
  // 術式封印中はMP0の技しか使えない
  if (state.player.domainCooldown > 0 && skill.mp > 0) return;

  state.busy = true;
  state.phase = 'cpu'; // 次のアクションを無効化
  state.player.mp -= skill.mp;

  // 領域展開を使ったら2ターン術式封印
  if (skill.effect === 'domain') {
    state.player.domainCooldown = 2;
    addLog('⚠️ 無量空処の反動…2ターンの間、術式が使えない！', 'text-orange-400');
  }

  renderSkills(); // 即時無効化

  const execute = () => {
    if (skill.effect === 'shield') {
      state.player.shield = true;
      addLog(`🛡️ ${state.player.name}が「${skill.name}」を発動！次の攻撃を無効化する。`, 'text-slate-300');
      showDamageFloat('gojo', 'SHIELD!', '#94a3b8');
      renderChar('gojo', state.player);
      setTimeout(cpuTurn, 900);
    } else if (skill.effect === 'heal') {
      const [lo, hi] = skill.heal;
      const amt = Math.floor(Math.random() * (hi - lo + 1)) + lo;
      state.player.hp = Math.min(state.player.maxHp, state.player.hp + amt);
      addLog(`💚 ${state.player.name}の「${skill.name}」！ HP+${amt}回復！`, 'text-green-400');
      showDamageFloat('gojo', `+${amt}`, '#34d399');
      renderChar('gojo', state.player);
      setTimeout(cpuTurn, 900);
    } else if (skill.effect === 'stun') {
      addLog(`🛑 ${state.player.name}の「${skill.name}」！宿儺は次ターン行動不能！`, 'text-violet-400');
      showDamageFloat('sukuna', 'STUN!', '#8b5cf6');
      state.cpu.stunned = true;
      setTimeout(cpuTurn, 900);
    } else if (skill.effect === 'domain') {
      addLog(`✨ 領域展開！「${skill.name}」！`, 'text-indigo-300');
      domainEffect('rgba(99,74,198,0.5)', () => {
        applyDamage('sukuna', skill, 'gojo');
        if (state.phase !== 'end') setTimeout(cpuTurn, 900);
      });
    } else {
      const dmg = rollDamage(skill);
      addLog(`${state.player.icon || '🔵'} ${state.player.name}の「${skill.name}」！ → ${dmg}ダメージ！`, 'text-indigo-300');
      applyDamageRaw('sukuna', dmg, skill.glow);
      if (state.phase !== 'end') setTimeout(cpuTurn, 900);
    }
  };

  setTimeout(execute, 200);
}

function applyDamage(targetId, skill, _src) {
  const target = targetId === 'sukuna' ? state.cpu : state.player;
  const dmg = rollDamage(skill);
  if (target.shield) {
    target.shield = false;
    addLog(`🛡️ 無限発動！攻撃を無効化！`, 'text-slate-400');
    showDamageFloat(targetId, 'BLOCKED!', '#94a3b8');
    renderAll();
    return;
  }
  target.hp = Math.max(0, target.hp - dmg);
  showDamageFloat(targetId, `-${dmg}`, skill.glow || '#fff');
  renderChar(targetId, target);
  checkDeath();
}

function applyDamageRaw(targetId, dmg, color) {
  const target = targetId === 'sukuna' ? state.cpu : state.player;
  if (target.shield) {
    target.shield = false;
    addLog(`🛡️ ${target.name}のシールドが攻撃を弾いた！`, 'text-slate-400');
    showDamageFloat(targetId, 'BLOCKED!', '#94a3b8');
    renderAll();
    return;
  }
  target.hp = Math.max(0, target.hp - dmg);
  showDamageFloat(targetId, `-${dmg}`, color || '#fff');
  renderChar(targetId, target);
  checkDeath();
}

// ===== CPUターン =====
function cpuTurn() {
  if (state.phase === 'end') return;

  // MP回復（両者）
  state.player.mp = Math.min(state.player.maxMp, state.player.mp + MP_REGEN);
  state.cpu.mp    = Math.min(state.cpu.maxMp,    state.cpu.mp    + MP_REGEN);
  state.turn++;
  renderTurnBadge();

  // 術式封印カウンターを減少
  if (state.player.domainCooldown > 0) state.player.domainCooldown--;
  if (state.cpu.domainCooldown > 0) state.cpu.domainCooldown--;

  // スタン判定（呪言「動くな」の効果）
  if (state.cpu.stunned) {
    state.cpu.stunned = false;
    addLog('🛑 宿儺は行動不能…！', 'text-violet-300');
    setTimeout(finishTurn, 600);
    return;
  }

  // CPU思考
  const cpu   = state.cpu;
  const cpuSealed = cpu.domainCooldown > 0; // 術式封印中
  // 炎矢ロック（宿儺の場合のみ）
  const fireUnlocked = cpu.special ? (cpu.usedDismantle && cpu.usedCleave) : true;
  const affordable = cpu.skills.filter(sk => {
    if (sk.mp > cpu.mp) return false;
    if (sk.requiresBoth && !fireUnlocked) return false;
    // 術式封印中はMP0の技しか使えない
    if (cpuSealed && sk.mp > 0) return false;
    return true;
  });

  // 戦略: 難易度に応じた思考
  let chosen;
  const diff = state.cpuDifficulty;

  if (diff === 'easy') {
    // Easy: 完全ランダム
    chosen = affordable[Math.floor(Math.random() * affordable.length)];
  } else if (diff === 'hard') {
    // Hard: 残りHP少ないとき最大火力、通常時も高コスト優先
    if (cpu.hp < 40 && affordable.some(sk => sk.mp >= 3)) {
      const power = affordable.filter(sk => sk.mp >= 3);
      chosen = power[Math.floor(Math.random() * power.length)];
    } else {
      // コストの2乗で重み付け（高コスト技を強く優先）
      const weights = affordable.map(sk => (sk.mp + 1) * (sk.mp + 1));
      const total   = weights.reduce((a,b) => a+b, 0);
      let r = Math.random() * total;
      chosen = affordable[0];
      for (let i = 0; i < affordable.length; i++) {
        r -= weights[i]; if (r <= 0) { chosen = affordable[i]; break; }
      }
    }
  } else {
    // Normal: HPが30以下なら高火力、それ以外は重み付きランダム
    if (cpu.hp < 30 && affordable.some(sk => sk.mp >= 3)) {
      const power = affordable.filter(sk => sk.mp >= 3);
      chosen = power[Math.floor(Math.random() * power.length)];
    } else {
      const weights = affordable.map(sk => sk.mp + 1);
      const total   = weights.reduce((a,b) => a+b, 0);
      let r = Math.random() * total;
      chosen = affordable[0];
      for (let i = 0; i < affordable.length; i++) {
        r -= weights[i]; if (r <= 0) { chosen = affordable[i]; break; }
      }
    }
  }

  cpu.mp -= chosen.mp;

  // 使用フラグを更新
  if (chosen.id === 's_dismantle') cpu.usedDismantle = true;
  if (chosen.id === 's_cleave')    cpu.usedCleave    = true;
  if (chosen.id === 's_fire') {
    addLog('🔥 宿儺の封印術式「炎矢」が解放された！', 'text-orange-400');
  }
  // 領域展開を使ったら2ターン術式封印
  if (chosen.effect === 'domain') {
    cpu.domainCooldown = 2;
    addLog(`⚠️ ${cpu.name}の領域展開の反動…2ターン術式が使えない！`, 'text-orange-400');
  }

  // CPU技表示
  const disp = document.getElementById('sukuna-action-display');
  disp.textContent = `「${chosen.name}」${chosen.icon}`;
  disp.style.opacity = '1';
  setTimeout(() => { disp.style.opacity = '0'; }, 1500);

  const executeCpu = () => {
    if (chosen.effect === 'domain') {
      addLog(`⛩️ 領域展開！「${chosen.name}」！`, 'text-red-400');
      domainEffect('rgba(220,38,38,0.45)', () => {
        applyDamageRaw('gojo', rollDamage(chosen), '#f87171');
        if (state.phase !== 'end') finishTurn();
      });
    } else if (chosen.effect === 'heal') {
      const [lo, hi] = chosen.heal;
      const amt = Math.floor(Math.random() * (hi - lo + 1)) + lo;
      cpu.hp = Math.min(cpu.maxHp, cpu.hp + amt);
      addLog(`💚 ${cpu.name}の「${chosen.name}」！ HP+${amt}回復！`, 'text-green-400');
      showDamageFloat('sukuna', `+${amt}`, '#34d399');
      renderChar('sukuna', cpu);
      if (state.phase !== 'end') finishTurn();
    } else if (chosen.effect === 'shield') {
      cpu.shield = true;
      addLog(`🛡️ ${cpu.name}が「${chosen.name}」を発動！次の攻撃を無効化！`, 'text-slate-300');
      showDamageFloat('sukuna', 'SHIELD!', '#94a3b8');
      renderChar('sukuna', cpu);
      if (state.phase !== 'end') finishTurn();
    } else {
      const dmg = rollDamage(chosen);
      addLog(`${cpu.icon||'👹'} ${cpu.name}の「${chosen.name}」！ → ${dmg}ダメージ！`, 'text-red-400');
      applyDamageRaw('gojo', dmg, '#f87171');
      // 解/捌 使用後に炎矢解放状況を通知（宿儺のみ）
      if (cpu.special && (chosen.id === 's_dismantle' || chosen.id === 's_cleave')) {
        const d = cpu.usedDismantle, c = cpu.usedCleave;
        if (d && c) {
          addLog('⚠️ 「解」と「捌」使用完了…「炎矢」が解放される！', 'text-orange-300');
        } else if (d && !c) {
          addLog('💥 「解」使用。残り「捌」で炎矢解放。', 'text-yellow-600');
        } else if (!d && c) {
          addLog('🌀 「捌」使用。残り「解」で炎矢解放。', 'text-yellow-600');
        }
      }
      if (state.phase !== 'end') finishTurn();
    }
  };

  setTimeout(executeCpu, 600);
}

function finishTurn() {
  if (state.phase === 'end') return;
  state.phase = 'player';
  state.busy  = false;
  renderAll();
  addLog(`── ターン ${state.turn} 開始 ──`, 'text-gray-600');
}

// ===== 死亡チェック =====
function checkDeath() {
  if (state.phase === 'end') return;
  if (state.player.hp <= 0 && state.cpu.hp <= 0) {
    endGame('draw');
  } else if (state.cpu.hp <= 0) {
    endGame('win');
  } else if (state.player.hp <= 0) {
    endGame('lose');
  }
}

// ===== ゲーム終了 =====
function endGame(result) {
  state.phase = 'end';
  state.busy  = true;
  renderSkills();

  setTimeout(() => {
    const overlay = document.getElementById('result-overlay');
    const icon    = document.getElementById('result-icon');
    const title   = document.getElementById('result-title');
    const sub     = document.getElementById('result-sub');

    if (result === 'win') {
      icon.textContent  = '🏆';
      title.textContent = '勝利！';
      title.className   = 'title-font text-3xl font-black text-indigo-400';
      sub.textContent   = '「次は試験に遅刻しないように気をつけます」— 五条悟';
      overlay.querySelector('.result-box').style.borderColor = '#818cf8';
    } else if (result === 'lose') {
      icon.textContent  = '💀';
      title.textContent = '敗北…';
      title.className   = 'title-font text-3xl font-black text-red-400';
      sub.textContent   = '「俺の強さに怯えるな。呪術師ならば立って戦え」— 両面宿儺';
      overlay.querySelector('.result-box').style.borderColor = '#f87171';
    } else {
      icon.textContent  = '⚔️';
      title.textContent = '引き分け';
      title.className   = 'title-font text-3xl font-black text-yellow-400';
      sub.textContent   = '互いの術式が完全に相殺された。';
      overlay.querySelector('.result-box').style.borderColor = '#facc15';
    }
    overlay.classList.remove('hidden');
  }, 600);
}

// ===== リスタート =====
document.getElementById('btn-retry').addEventListener('click', () => {
  document.getElementById('battle-area').classList.add('hidden');
  document.getElementById('char-select').classList.remove('hidden');
  document.getElementById('result-overlay').classList.add('hidden');
});

// ===== キャラ選択UI =====
function renderCharSelect() {
  // 自分キャラグリッド
  const grid = document.getElementById('char-grid');
  grid.innerHTML = '';
  Object.values(CHARACTERS).forEach(ch => {
    const card = document.createElement('button');
    const isSelected = selectedCharId === ch.id;
    card.className = `flex flex-col items-center gap-1 p-3 rounded-xl border-2 transition cursor-pointer
      ${isSelected ? ch.color + ' bg-gray-800 shadow-lg' : 'border-gray-700 bg-gray-900 hover:bg-gray-800 hover:border-gray-500'}`;
    card.innerHTML = `
      <span class="text-3xl">${ch.icon}</span>
      <span class="text-xs font-bold ${ch.textColor}">${ch.name}</span>
      <span class="text-xs text-gray-500">${ch.title}</span>
      <span class="text-xs text-gray-600">HP:${ch.hp}</span>
    `;
    card.addEventListener('click', () => {
      selectedCharId = ch.id;
      renderCharSelect();
      updateStartBtn();
    });
    grid.appendChild(card);
  });

  // 敵キャラグリッド（全CHARACTERS + 宿儺）
  const egrid = document.getElementById('enemy-grid');
  egrid.innerHTML = '';
  const enemies = [
    ENEMY_DATA.sukuna,
    ...Object.values(CHARACTERS),
  ];
  enemies.forEach(ch => {
    const eid = ch === ENEMY_DATA.sukuna ? 'sukuna' : ch.id;
    const card = document.createElement('button');
    const isSelected = selectedEnemyId === eid;
    card.className = `flex flex-col items-center gap-1 p-3 rounded-xl border-2 transition cursor-pointer
      ${isSelected ? (ch.color||'border-red-500') + ' bg-gray-800 shadow-lg' : 'border-gray-700 bg-gray-900 hover:bg-gray-800 hover:border-gray-500'}`;
    card.innerHTML = `
      <span class="text-3xl">${ch.icon}</span>
      <span class="text-xs font-bold ${ch.textColor||'text-red-400'}">${ch.name}</span>
      <span class="text-xs text-gray-500">${ch.title||''}</span>
      <span class="text-xs text-gray-600">HP:${ch.hp}</span>
    `;
    card.addEventListener('click', () => {
      selectedEnemyId = eid;
      renderCharSelect();
      updateStartBtn();
    });
    egrid.appendChild(card);
  });

  // 難易度ボタン
  document.querySelectorAll('.diff-btn').forEach(btn => {
    const d = btn.dataset.diff;
    btn.classList.remove('bg-green-500','bg-yellow-500','bg-red-500','text-white','text-gray-900','opacity-50');
    if (d === cpuDifficulty) {
      if (d === 'easy')   btn.classList.add('bg-green-500','text-white');
      if (d === 'normal') btn.classList.add('bg-yellow-500','text-gray-900');
      if (d === 'hard')   btn.classList.add('bg-red-500','text-white');
    } else {
      btn.classList.add('opacity-50');
    }
  });
}

function updateStartBtn() {
  document.getElementById('btn-start-battle').disabled = !(selectedCharId && selectedEnemyId);
}

document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    cpuDifficulty = btn.dataset.diff;
    renderCharSelect();
  });
});

document.getElementById('btn-start-battle').addEventListener('click', () => {
  document.getElementById('char-select').classList.add('hidden');
  document.getElementById('battle-area').classList.remove('hidden');
  initGame();
});

// ===== 起動 =====
renderCharSelect();
</script>
</body>
</html>
