<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>中国語単語帳</title>
<link rel="manifest" href="./manifest.json"/>
<meta name="theme-color" content="#2563eb"/>
<!-- PWA: スタンドアロン起動（Safari対応） -->
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="単語アプリ"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='36' fill='%232563eb'/><text x='90' y='120' font-size='90' text-anchor='middle' fill='white' font-family='sans-serif'>中</text></svg>"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #f8fafc; }
  .card-enter { animation: cardIn 0.3s ease forwards; }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body class="min-h-screen py-8 px-4">

<!-- ===== ヘッダー ===== -->
<div class="max-w-2xl mx-auto mb-8 text-center">
  <h1 class="text-3xl font-bold text-gray-800 tracking-wide">📖 中国語単語帳</h1>
  <p class="text-sm text-gray-500 mt-1">単語を登録して、発音を確認しよう</p>
</div>

<!-- ===== 入力フォーム ===== -->
<div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-lg p-4 sm:p-6 mb-8">


  <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-4">
    <!-- 漢字 -->
    <div class="flex flex-col gap-1">
      <label for="inp-hanzi" class="text-xs font-semibold text-gray-500">漢字（単語）</label>
      <input id="inp-hanzi" type="text" placeholder="例：你好"
             class="border border-gray-300 rounded-lg px-3 py-2 text-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition"/>
    </div>
    <!-- ピンイン -->
    <div class="flex flex-col gap-1">
      <label for="inp-pinyin" class="text-xs font-semibold text-gray-500">ピンイン</label>
      <input id="inp-pinyin" type="text" placeholder="例：nǐ hǎo"
             class="border border-gray-300 rounded-lg px-3 py-2 text-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition"/>
    </div>
    <!-- 意味 -->
    <div class="flex flex-col gap-1">
      <label for="inp-meaning" class="text-xs font-semibold text-gray-500">意味</label>
      <input id="inp-meaning" type="text" placeholder="例：こんにちは"
             class="border border-gray-300 rounded-lg px-3 py-2 text-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition"/>
    </div>
  </div>
  <div class="flex justify-end">
    <button id="btn-save"
            class="px-6 py-2 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg shadow transition active:scale-95">
      保存
    </button>
  </div>
  <div id="form-msg" class="mt-2 text-sm text-red-500 hidden"></div>
</div>

<!-- ===== モード切替・検索・件数 ===== -->
<div class="max-w-2xl mx-auto flex flex-col sm:flex-row items-start sm:items-center justify-between gap-2 mb-4 px-1">
  <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-2 w-full sm:w-auto relative">
    <input id="inp-search" type="text" placeholder="🔍 検索..."
           class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 w-full sm:w-48 transition"/>
    <!-- 課フィルター候補ドロップダウン -->
    <div id="lesson-suggest" class="hidden absolute z-20 top-full left-0 bg-white border border-gray-200 rounded-lg shadow-lg mt-1 py-1 w-48"></div>
    <button id="btn-test-mode"
            class="w-full sm:w-auto px-4 py-1.5 bg-amber-500 hover:bg-amber-400 text-white text-sm font-bold rounded-lg shadow transition active:scale-95">
      📝 テストモード
    </button>
  </div>
  <span id="word-count" class="text-xs text-gray-400">0 件</span>
</div>

<!-- ===== 単語帳モード（通常画面） ===== -->
<div id="wordbook-mode">

<!-- ===== 単語カード一覧 ===== -->
<div id="card-list" class="max-w-2xl mx-auto grid grid-cols-1 sm:grid-cols-2 gap-4">
  <!-- カードはJSで動的生成 -->
</div>

<!-- 空状態 -->
<div id="empty-state" class="max-w-2xl mx-auto text-center py-16 hidden">
  <p class="text-gray-400 text-lg">まだ単語が登録されていません</p>
  <p class="text-gray-300 text-sm mt-1">上のフォームから単語を追加しましょう</p>
</div>

</div><!-- /wordbook-mode -->

<!-- ===== テストモード ===== -->
<div id="test-mode" class="hidden max-w-2xl mx-auto">
  <div class="bg-white rounded-2xl shadow-lg p-8 flex flex-col items-center gap-6">
    <!-- ヘッダー -->
    <div class="flex items-center justify-between w-full">
      <h2 class="text-lg font-bold text-amber-600">📝 テストモード</h2>
      <button id="btn-exit-test"
              class="px-4 py-1.5 bg-gray-200 hover:bg-gray-300 text-gray-700 text-sm font-bold rounded-lg transition">
        ← 単語帳に戻る
      </button>
    </div>

    <!-- テスト種別選択（単語カード / 記述式） -->
    <div id="test-category-select" class="w-full flex flex-col items-center gap-4">
      <p class="text-sm text-gray-500">テスト形式を選んでください</p>
      <div class="flex gap-4 w-full max-w-sm">
        <button id="btn-flashcard-mode"
                class="flex-1 py-6 rounded-xl border-2 border-orange-300 bg-orange-50 hover:bg-orange-100 transition flex flex-col items-center gap-2">
          <span class="text-3xl">🃏</span>
          <span class="text-sm font-bold text-orange-700">単語カード</span>
        </button>
        <button id="btn-writing-mode"
                class="flex-1 py-6 rounded-xl border-2 border-amber-300 bg-amber-50 hover:bg-amber-100 transition flex flex-col items-center gap-2">
          <span class="text-3xl">✍️</span>
          <span class="text-sm font-bold text-amber-700">記述式</span>
        </button>
      </div>
    </div>

    <!-- 記述式: 出題形式選択 -->
    <div id="test-type-select" class="hidden w-full flex flex-col items-center gap-2">
      <p class="text-xs text-gray-400">出題形式を選んでください</p>
      <div class="flex flex-wrap gap-2 justify-center">
        <button data-type="meaning-to-hanzi" class="test-type-btn px-4 py-2 rounded-lg border-2 border-amber-400 bg-amber-50 text-amber-700 text-sm font-bold transition hover:bg-amber-100">
          日本語 → 中国語
        </button>
        <button data-type="hanzi-to-meaning" class="test-type-btn px-4 py-2 rounded-lg border-2 border-green-400 bg-green-50 text-green-700 text-sm font-bold transition hover:bg-green-100">
          中国語 → 日本語
        </button>
        <button data-type="pinyin-to-hanzi" class="test-type-btn px-4 py-2 rounded-lg border-2 border-purple-400 bg-purple-50 text-purple-700 text-sm font-bold transition hover:bg-purple-100">
          ピンイン → 中国語
        </button>
        <button data-type="hanzi-to-pinyin" class="test-type-btn px-4 py-2 rounded-lg border-2 border-teal-400 bg-teal-50 text-teal-700 text-sm font-bold transition hover:bg-teal-100">
          中国語 → ピンイン
        </button>
      </div>
    </div>

    <!-- 単語カード: サブモード選択 -->
    <div id="flashcard-type-select" class="hidden w-full flex flex-col items-center gap-2">
      <p class="text-xs text-gray-400">カードの表示形式を選んでください</p>
      <div class="flex flex-wrap gap-2 justify-center">
        <button data-fc-type="meaning-hanzi" class="fc-type-btn px-4 py-2 rounded-lg border-2 border-orange-400 bg-orange-50 text-orange-700 text-sm font-bold transition hover:bg-orange-100">
          日本語・中国語
        </button>
        <button data-fc-type="meaning-pinyin" class="fc-type-btn px-4 py-2 rounded-lg border-2 border-pink-400 bg-pink-50 text-pink-700 text-sm font-bold transition hover:bg-pink-100">
          日本語・ピンイン
        </button>
        <button data-fc-type="hanzi-pinyin" class="fc-type-btn px-4 py-2 rounded-lg border-2 border-violet-400 bg-violet-50 text-violet-700 text-sm font-bold transition hover:bg-violet-100">
          中国語・ピンイン
        </button>
      </div>
    </div>

    <!-- スコア表示 -->
    <div id="test-score" class="hidden flex gap-6 text-sm text-gray-500">
      <span>正解: <span id="score-correct" class="font-bold text-green-600">0</span></span>
      <span>不正解: <span id="score-wrong" class="font-bold text-red-500">0</span></span>
      <span>残り: <span id="score-remaining" class="font-bold text-gray-700">0</span></span>
    </div>

    <!-- 記述式: 問題表示 -->
    <div id="test-question-area" class="hidden w-full text-center py-6">
      <p id="test-question-label" class="text-sm text-gray-400 mb-2"></p>
      <div id="test-question" class="text-3xl font-black text-gray-800"></div>
    </div>

    <!-- 記述式: 回答入力 -->
    <div id="test-input-area" class="hidden w-full flex flex-col items-center gap-3">
      <input id="inp-answer" type="text" placeholder="中国語（漢字）を入力..."
             class="w-full max-w-xs border-2 border-amber-300 rounded-xl px-4 py-3 text-xl text-center focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent transition"/>
      <button id="btn-answer"
              class="px-8 py-2.5 bg-amber-500 hover:bg-amber-400 text-white font-bold rounded-xl shadow transition active:scale-95">
        回答する
      </button>
    </div>

    <!-- 記述式: 結果表示 -->
    <div id="test-result-area" class="hidden w-full flex flex-col items-center gap-4">
      <div id="test-result-msg" class="text-xl font-bold"></div>
      <div id="test-result-detail" class="text-sm text-gray-500 bg-gray-50 rounded-xl p-4 w-full max-w-xs text-center"></div>
      <button id="btn-next-question"
              class="px-8 py-2.5 bg-blue-500 hover:bg-blue-400 text-white font-bold rounded-xl shadow transition active:scale-95">
        次の問題 →
      </button>
    </div>

    <!-- 単語カード: フラッシュカード表示 -->
    <div id="flashcard-area" class="hidden w-full flex flex-col items-center gap-4">
      <div id="flashcard-container" class="relative w-full max-w-sm h-64 flex items-center justify-center">
        <div id="flashcard" class="absolute inset-0 bg-gradient-to-br from-white to-gray-50 rounded-2xl shadow-xl border border-gray-100 flex flex-col items-center justify-center p-6 cursor-grab select-none transition-transform duration-300"
             style="touch-action: pan-y;">
          <div id="fc-front" class="text-center">
            <div id="fc-front-label" class="text-xs text-gray-400 mb-2"></div>
            <div id="fc-front-text" class="text-3xl font-black text-gray-800"></div>
          </div>
          <div id="fc-back" class="hidden text-center mt-4 pt-4 border-t-2 border-dashed border-gray-200 w-full">
            <div id="fc-back-label" class="text-xs text-gray-400 mb-1"></div>
            <div id="fc-back-text" class="text-2xl font-bold text-blue-600"></div>
          </div>
        </div>
      </div>
      <p id="fc-tap-hint" class="text-xs text-gray-400">タップ・Enterで答えを表示 / スワイプ・← →で判定</p>
      <div id="fc-buttons" class="hidden flex items-center gap-6 mt-2">
        <button id="btn-fc-wrong" class="w-14 h-14 rounded-full bg-red-100 hover:bg-red-200 text-red-500 text-2xl font-bold flex items-center justify-center transition active:scale-90 shadow">✕</button>
        <button id="btn-fc-undo" class="hidden w-10 h-10 rounded-full bg-gray-100 hover:bg-gray-200 text-gray-500 text-lg font-bold flex items-center justify-center transition active:scale-90 shadow">↩</button>
        <button id="btn-fc-correct" class="w-14 h-14 rounded-full bg-green-100 hover:bg-green-200 text-green-500 text-2xl font-bold flex items-center justify-center transition active:scale-90 shadow">✓</button>
      </div>
      <button id="btn-fc-undo-standalone" class="hidden mt-2 px-4 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-500 text-sm font-bold rounded-lg transition active:scale-95">
        ↩ 前のカードに戻す
      </button>
    </div>

    <!-- 単語不足メッセージ -->
    <div id="test-empty" class="hidden text-center py-8">
      <p class="text-gray-400 text-lg">テストに使える単語がありません</p>
      <p class="text-gray-300 text-sm mt-1">まず単語帳に単語を登録してください</p>
    </div>

    <!-- テスト完了 -->
    <div id="test-complete" class="hidden text-center py-8">
      <p class="text-2xl font-bold text-amber-600">🎉 テスト完了！</p>
      <div id="test-final-score" class="mt-3 text-base text-gray-600"></div>
      <button id="btn-restart-test"
              class="mt-4 px-6 py-2 bg-amber-500 hover:bg-amber-400 text-white font-bold rounded-xl shadow transition">
        もう一度テスト
      </button>
    </div>
  </div>
</div>

<script>
'use strict';

/* ============================================================
   中国語単語帳アプリ
   - localStorage によるデータ永続化
   - Web Speech API による中国語読み上げ
   ============================================================ */

// ===== データ管理 =====
const STORAGE_KEY = 'hanyu_wordbook';
const WORDS_JSON_VERSION_KEY = 'hanyu_words_json_version';
const USER_LESSON_KEY = '__user__';

const $ = id => document.getElementById(id);
const setHidden = (element, hidden) => element.classList.toggle('hidden', hidden);
const getLessonNumber = lesson => parseInt(lesson.replace(/\D/g, ''), 10) || 0;
const sortLessons = (a, b) => getLessonNumber(a) - getLessonNumber(b);

const elements = {
  cardList: $('card-list'),
  emptyState: $('empty-state'),
  wordCount: $('word-count'),
  searchInput: $('inp-search'),
  lessonSuggest: $('lesson-suggest'),
  wordbookMode: $('wordbook-mode'),
  testMode: $('test-mode'),
  answerInput: $('inp-answer'),
};

// localStorageからユーザー追加分の単語を読み込む
function loadUserWords() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    return [];
  }
}

function saveUserWords(list) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

// words.json からプリセット単語を取得（常に最新を取得）
async function fetchPresetWords() {
  try {
    // キャッシュバスティング: ブラウザのHTTPキャッシュを回避
    const res = await fetch('./words.json?t=' + Date.now(), { cache: 'no-cache' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    // バージョン管理: words.json が更新されたら再マージ
    const storedVersion = parseInt(localStorage.getItem(WORDS_JSON_VERSION_KEY) || '0', 10);
    if (data.version > storedVersion) {
      localStorage.setItem(WORDS_JSON_VERSION_KEY, String(data.version));
    }
    return data.words || [];
  } catch (e) {
    console.warn('words.json の読み込みに失敗（オフラインキャッシュも無し）:', e);
    return null;
  }
}

// 全単語を統合（プリセット + ユーザー追加）
let words = [];
let presetWords = [];
let isRefreshingWords = false;
let currentView = 'lessons'; // 'lessons' | 'words'
let currentLesson = null;    // 表示中の課名（null=一覧）

async function initWords() {
  presetWords = await fetchPresetWords() || [];
  words = [...loadUserWords(), ...presetWords];
  renderLessonList();
}

async function refreshWords() {
  if (isRefreshingWords) return;
  isRefreshingWords = true;

  try {
    const latestPresetWords = await fetchPresetWords();
    if (!latestPresetWords) return;

    const hasChanges = JSON.stringify(latestPresetWords) !== JSON.stringify(presetWords);
    if (!hasChanges) return;

    presetWords = latestPresetWords;
    words = [...loadUserWords(), ...presetWords];

    const searchText = elements.searchInput.value.trim();
    if (searchText && !searchText.startsWith('第')) {
      renderSearchResults(searchText);
    } else if (currentView === 'words' && currentLesson) {
      currentLesson === USER_LESSON_KEY ? openUserWords() : openLesson(currentLesson);
    } else {
      renderLessonList();
    }
  } finally {
    isRefreshingWords = false;
  }
}

// ===== レッスン一覧表示 =====
function renderLessonList() {
  currentView = 'lessons';
  currentLesson = null;
  const { cardList: list, emptyState: empty, wordCount: countEl } = elements;
  list.innerHTML = '';

  // レッスンごとにグルーピング
  const lessonMap = new Map(); // lesson名 → 単語配列
  const userWords = [];
  words.forEach(w => {
    if (w.lesson) {
      if (!lessonMap.has(w.lesson)) lessonMap.set(w.lesson, []);
      lessonMap.get(w.lesson).push(w);
    } else {
      userWords.push(w);
    }
  });

  const totalGroups = lessonMap.size + (userWords.length > 0 ? 1 : 0);
  countEl.textContent = `${totalGroups} グループ / ${words.length} 語`;

  setHidden(empty, words.length > 0);
  if (words.length === 0) return;

  // ユーザー追加分（マイ単語）を先頭に表示
  if (userWords.length > 0) {
    const card = createLessonCard('マイ単語', userWords.length, null);
    list.appendChild(card);
  }

  // 課ごとのカードを数字順に表示
  const sortedLessons = [...lessonMap.entries()].sort((a, b) => sortLessons(a[0], b[0]));

  sortedLessons.forEach(([lesson, wordsInLesson]) => {
    const card = createLessonCard(lesson, wordsInLesson.length, lesson);
    list.appendChild(card);
  });
}

function createLessonCard(title, wordCount, lessonKey) {
  const card = document.createElement('div');
  card.className = 'card-enter bg-white rounded-xl shadow-md p-6 flex items-center gap-4 cursor-pointer hover:shadow-lg hover:scale-[1.02] transition-all';

  const icon = lessonKey ? '📚' : '✏️';
  const colorClass = lessonKey ? 'bg-indigo-100 text-indigo-600' : 'bg-blue-100 text-blue-600';

  card.innerHTML = `
    <div class="w-12 h-12 rounded-xl ${colorClass} flex items-center justify-center text-2xl flex-shrink-0">${icon}</div>
    <div class="flex-1 min-w-0">
      <div class="text-lg font-bold text-gray-800 truncate">${escapeHtml(title)}</div>
      <div class="text-sm text-gray-400">${wordCount} 語</div>
    </div>
    <div class="text-gray-300 text-xl">›</div>
  `;

  card.addEventListener('click', () => {
    if (lessonKey) {
      openLesson(lessonKey);
    } else {
      openUserWords();
    }
  });

  return card;
}

// ===== 課を開いて単語一覧を表示 =====
function openLesson(lessonName) {
  currentView = 'words';
  currentLesson = lessonName;
  const filtered = words.filter(w => w.lesson === lessonName);
  renderWordCards(filtered, lessonName);
}

function openUserWords() {
  currentView = 'words';
  currentLesson = USER_LESSON_KEY;
  const filtered = words.filter(w => !w.lesson);
  renderWordCards(filtered, 'マイ単語');
}

function renderWordCards(wordList, title) {
  const { cardList: list, emptyState: empty, wordCount: countEl } = elements;
  list.innerHTML = '';

  countEl.textContent = `${title} - ${wordList.length} 語`;

  // 戻るボタン
  const backBtn = document.createElement('div');
  backBtn.className = 'col-span-1 sm:col-span-2 mb-2';
  backBtn.innerHTML = `
    <button id="btn-back-to-lessons" class="px-4 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-600 text-sm font-bold rounded-lg transition active:scale-95">
      ← 一覧に戻る
    </button>
  `;
  list.appendChild(backBtn);
  backBtn.querySelector('#btn-back-to-lessons').addEventListener('click', () => {
    searchInput.value = '';
    renderLessonList();
  });

  setHidden(empty, wordList.length > 0);
  if (wordList.length === 0) return;

  wordList.forEach((word) => {
    const realIdx = words.indexOf(word);
    const card = document.createElement('div');
    card.className = 'card-enter bg-white rounded-xl shadow-md p-5 flex flex-col gap-2 relative group';

    const lessonTag = word.lesson
      ? `<span class="absolute top-2 left-2 text-[10px] font-bold px-1.5 py-0.5 rounded bg-indigo-100 text-indigo-600">${escapeHtml(word.lesson)}</span>`
      : '';

    card.innerHTML = `
      ${lessonTag}
      <div class="flex items-start justify-between ${word.lesson ? 'mt-4' : ''}">
        <div>
          <div class="text-2xl font-bold text-gray-800 leading-tight">${escapeHtml(word.hanzi)}</div>
          <div class="text-sm text-blue-500 font-medium mt-0.5">${escapeHtml(word.pinyin)}</div>
        </div>
        ${word.lesson ? '' : `
          <button class="btn-delete opacity-0 group-hover:opacity-100 transition text-gray-300 hover:text-red-400 text-lg" data-idx="${realIdx}" title="削除">
            ✕
          </button>
        `}
      </div>
      <div class="text-sm text-gray-600 border-t border-gray-100 pt-2">${escapeHtml(word.meaning)}</div>
      <div class="flex justify-end mt-1">
        <button class="btn-speak px-3 py-1 bg-green-50 hover:bg-green-100 text-green-700 text-xs font-bold rounded-lg border border-green-200 transition active:scale-95"
                data-hanzi="${escapeAttr(word.hanzi)}">
          🔊 発音する
        </button>
      </div>
    `;
    list.appendChild(card);
  });

  list.querySelectorAll('.btn-speak').forEach(btn => {
    btn.addEventListener('click', () => speak(btn.dataset.hanzi));
  });
  list.querySelectorAll('.btn-delete').forEach(btn => {
    btn.addEventListener('click', () => {
      if (confirm('この単語を削除しますか？')) {
        deleteWord(parseInt(btn.dataset.idx));
      }
    });
  });
}

// ===== テキスト検索結果を表示 =====
function renderSearchResults(filter) {
  const normalizedFilter = filter.toLowerCase();
  const filtered = words.filter(w =>
    w.hanzi.includes(filter) ||
    w.pinyin.toLowerCase().includes(normalizedFilter) ||
    w.meaning.includes(filter)
  );
  renderWordCards(filtered, `検索: ${filter}`);
}

// ===== 単語追加 =====
function addWord(hanzi, pinyin, meaning) {
  const newWord = { hanzi, pinyin, meaning, created: Date.now() };
  const userWords = loadUserWords();
  userWords.unshift(newWord);
  saveUserWords(userWords);
  words.unshift(newWord);
  // 追加後はマイ単語を開く
  openUserWords();
}

// ===== 単語削除 =====
function deleteWord(idx) {
  const target = words[idx];
  words.splice(idx, 1);
  if (!target.lesson) {
    const userWords = loadUserWords();
    const uIdx = userWords.findIndex(w => w.hanzi === target.hanzi && w.created === target.created);
    if (uIdx !== -1) {
      userWords.splice(uIdx, 1);
      saveUserWords(userWords);
    }
  }
  // 現在のビューを維持
  if (currentView === 'words' && currentLesson) {
    if (currentLesson === USER_LESSON_KEY) {
      openUserWords();
    } else {
      openLesson(currentLesson);
    }
  } else {
    renderLessonList();
  }
}

// ===== 発音（Web Speech API） =====
function speak(text) {
  if (!('speechSynthesis' in window)) {
    alert('このブラウザは音声合成に対応していません。');
    return;
  }
  // 既に再生中なら停止
  window.speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'zh-CN';
  utterance.rate = 0.85; // ゆっくりめ
  utterance.pitch = 1;

  // 中国語の音声を優先的に選択
  const voices = window.speechSynthesis.getVoices();
  const zhVoice = voices.find(v => v.lang === 'zh-CN') ||
                  voices.find(v => v.lang.startsWith('zh'));
  if (zhVoice) utterance.voice = zhVoice;

  window.speechSynthesis.speak(utterance);
}

// 音声リスト読み込み（非同期の場合に対応）
if ('speechSynthesis' in window) {
  window.speechSynthesis.onvoiceschanged = () => {};
}

// ===== ユーティリティ =====
function escapeHtml(value = '') {
  return String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escapeAttr(value = '') {
  return escapeHtml(value).replace(/'/g,'&#39;');
}

// 検索（課フィルター対応）
const { searchInput, lessonSuggest } = elements;

// 利用可能な課番号を取得
function getAvailableLessons() {
  const lessons = new Set();
  words.forEach(w => {
    if (w.lesson) lessons.add(w.lesson);
  });
  return [...lessons].sort(sortLessons);
}

// lesson名を正規化（「課」→「课」、全角数字→半角数字、漢数字→アラビア数字）
function normalizeLesson(str) {
  const kanjiToNum = {'一':'1','二':'2','三':'3','四':'4','五':'5','六':'6','七':'7','八':'8','九':'9','十':'10'};
  let result = str.replace(/課/g, '课')
                  .replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
  Object.entries(kanjiToNum).forEach(([k, v]) => {
    result = result.replace(new RegExp(k, 'g'), v);
  });
  return result;
}

// 候補ドロップダウンを表示
function showLessonSuggestions(filterText) {
  const lessons = getAvailableLessons();
  if (lessons.length === 0) {
    lessonSuggest.classList.add('hidden');
    return;
  }

  // filterTextで絞り込み（正規化して比較）
  const normalizedFilter = filterText ? normalizeLesson(filterText) : '';
  const matched = lessons.filter(l => {
    if (!normalizedFilter) return true;
    return normalizeLesson(l).includes(normalizedFilter);
  });

  if (matched.length === 0) {
    lessonSuggest.classList.add('hidden');
    return;
  }

  lessonSuggest.innerHTML = matched.map(l =>
    `<button class="lesson-suggest-item w-full text-left px-3 py-1.5 text-sm hover:bg-indigo-50 text-gray-700 transition" data-lesson="${escapeAttr(l)}">
      📚 ${escapeHtml(l)}
    </button>`
  ).join('');
  lessonSuggest.classList.remove('hidden');

  lessonSuggest.querySelectorAll('.lesson-suggest-item').forEach(btn => {
    btn.addEventListener('mousedown', (ev) => {
      ev.preventDefault();
      const lesson = btn.dataset.lesson;
      searchInput.value = lesson;
      lessonSuggest.classList.add('hidden');
      openLesson(lesson);
    });
  });
}

searchInput.addEventListener('input', e => {
  const val = e.target.value.trim();
  const normalizedVal = normalizeLesson(val);

  // 空ならレッスン一覧に戻る
  if (!val) {
    lessonSuggest.classList.add('hidden');
    renderLessonList();
    return;
  }

  // 「第」で始まる入力 → 課フィルターモード
  if (val.startsWith('第')) {
    // 完全一致する課があればその課を開く
    const lessons = getAvailableLessons();
    const exactMatch = lessons.find(l => normalizeLesson(l) === normalizedVal);
    if (exactMatch) {
      lessonSuggest.classList.add('hidden');
      openLesson(exactMatch);
      return;
    }
    // 途中入力 → 候補を表示
    showLessonSuggestions(val);
    return;
  }

  // 通常検索
  lessonSuggest.classList.add('hidden');
  renderSearchResults(val);
});

// フォーカスが外れたら候補を閉じる
searchInput.addEventListener('blur', () => {
  setTimeout(() => lessonSuggest.classList.add('hidden'), 300);
});



// ===== テストモード =====
let testState = {
  active: false,
  mode: null,     // 'writing' | 'flashcard'
  pool: [],
  current: null,
  correct: 0,
  wrong: 0,
  type: null,
  fcType: null,   // flashcard type
  fcRevealed: false,
  fcAnimating: false,
};

// 記述式の設定
const TEST_TYPES = {
  'meaning-to-hanzi': {
    label: '以下の日本語を中国語（漢字）で答えてください',
    placeholder: '中国語（漢字）を入力...',
    getQuestion: w => w.meaning || '(意味未登録)',
    getAnswer: w => w.hanzi,
  },
  'pinyin-to-hanzi': {
    label: '以下のピンインを中国語（漢字）で答えてください',
    placeholder: '中国語（漢字）を入力...',
    getQuestion: w => w.pinyin || '(ピンイン未登録)',
    getAnswer: w => w.hanzi,
  },
  'hanzi-to-pinyin': {
    label: '以下の中国語のピンインを答えてください',
    placeholder: 'ピンインを入力...',
    getQuestion: w => w.hanzi || '(漢字未登録)',
    getAnswer: w => w.pinyin,
  },
  'hanzi-to-meaning': {
    label: '以下の中国語の日本語の意味を答えてください',
    placeholder: '日本語の意味を入力...',
    getQuestion: w => w.hanzi || '(漢字未登録)',
    getAnswer: w => w.meaning,
  },
};

// 単語カードの設定
const FC_TYPES = {
  'meaning-hanzi': {
    frontLabel: '日本語',
    backLabel: '中国語',
    getFront: w => w.meaning || '',
    getBack: w => w.hanzi || '',
  },
  'meaning-pinyin': {
    frontLabel: '日本語',
    backLabel: 'ピンイン',
    getFront: w => w.meaning || '',
    getBack: w => w.pinyin || '',
  },
  'hanzi-pinyin': {
    frontLabel: '中国語',
    backLabel: 'ピンイン',
    getFront: w => w.hanzi || '',
    getBack: w => w.pinyin || '',
  },
};

const testPanelIds = [
  'test-category-select', 'test-type-select', 'flashcard-type-select',
  'test-score', 'test-question-area', 'test-input-area',
  'test-result-area', 'flashcard-area', 'test-empty', 'test-complete',
];
const testPanels = new Map(testPanelIds.map(id => [id, $(id)]));

function showTestPanels(visible) {
  const visiblePanels = new Set(visible);
  testPanels.forEach((panel, id) => {
    setHidden(panel, !visiblePanels.has(id));
  });
}

function resetTestProgress() {
  testState.pool = shuffleArray([...words]);
  testState.current = null;
  testState.correct = 0;
  testState.wrong = 0;
}

function enterTestMode() {
  setHidden(elements.testMode, false);
  setHidden(elements.wordbookMode, true);
  testState.active = true;
  testState.mode = null;

  if (words.length === 0) {
    showTestPanels(['test-empty']);
    return;
  }
  showTestPanels(['test-category-select']);
}

function exitTestMode() {
  testState.active = false;
  testState.mode = null;
  testState.type = null;
  testState.fcType = null;
  setHidden(elements.testMode, true);
  setHidden(elements.wordbookMode, false);
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// --- 記述式 ---
function enterWritingMode() {
  testState.mode = 'writing';
  showTestPanels(['test-type-select']);
}

function startTestWithType(type) {
  testState.type = type;
  resetTestProgress();
  showTestPanels(['test-score']);
  updateTestScore();
  showNextQuestion();
}

function showNextQuestion() {
  if (testState.pool.length === 0) {
    showTestComplete();
    return;
  }
  testState.current = testState.pool.pop();
  const cfg = TEST_TYPES[testState.type];

  $('test-question-label').textContent = cfg.label;
  $('test-question').textContent = cfg.getQuestion(testState.current);
  elements.answerInput.placeholder = cfg.placeholder;

  showTestPanels(['test-question-area', 'test-input-area', 'test-score']);
  elements.answerInput.value = '';
  elements.answerInput.focus();
  updateTestScore();
}

function checkAnswer() {
  const userAnswer = elements.answerInput.value.trim();
  if (!userAnswer) return;

  const cfg = TEST_TYPES[testState.type];
  const correctAnswer = cfg.getAnswer(testState.current);
  const isCorrect = userAnswer === correctAnswer;

  if (isCorrect) {
    testState.correct++;
    $('test-result-msg').textContent = '🎉 正解！';
    $('test-result-msg').className = 'text-xl font-bold text-green-600';
  } else {
    testState.wrong++;
    $('test-result-msg').textContent = '❌ 不正解';
    $('test-result-msg').className = 'text-xl font-bold text-red-500';
  }

  $('test-result-detail').innerHTML = `
    <div class="text-xs text-gray-400 mb-1">正解</div>
    <div class="text-lg font-bold text-gray-800">${escapeHtml(correctAnswer)}</div>
    <div class="mt-2 text-xs text-gray-400">この単語の情報</div>
    <div class="text-base font-bold text-gray-700">${escapeHtml(testState.current.hanzi)}</div>
    <div class="text-sm text-blue-500">${escapeHtml(testState.current.pinyin)}</div>
    <div class="text-xs text-gray-500">${escapeHtml(testState.current.meaning)}</div>
    ${!isCorrect ? `<div class="mt-2 text-xs text-red-400">あなたの回答: ${escapeHtml(userAnswer)}</div>` : ''}
  `;

  showTestPanels(['test-question-area', 'test-result-area', 'test-score']);
  updateTestScore();
}

// --- 単語カード（フラッシュカード） ---
let fcHistory = []; // 戻る用の履歴スタック

function enterFlashcardMode() {
  testState.mode = 'flashcard';
  showTestPanels(['flashcard-type-select']);
}

function startFlashcard(fcType) {
  testState.fcType = fcType;
  resetTestProgress();
  testState.fcRevealed = false;
  testState.fcAnimating = false;
  fcHistory = [];
  showTestPanels(['test-score', 'flashcard-area']);
  updateFcUndoBtn();
  updateTestScore();
  showNextFlashcard();
}

function showNextFlashcard() {
  if (testState.pool.length === 0) {
    showTestComplete();
    return;
  }
  testState.current = testState.pool.pop();
  testState.fcRevealed = false;
  testState.fcAnimating = false;
  renderFlashcard();
  updateFcUndoBtn();
  updateTestScore();
}

function renderFlashcard() {
  const cfg = FC_TYPES[testState.fcType];
  const flashcard = $('flashcard');

  flashcard.style.transform = '';
  flashcard.style.opacity = '1';
  $('fc-front-label').textContent = cfg.frontLabel;
  $('fc-front-text').textContent = cfg.getFront(testState.current);
  $('fc-back-label').textContent = cfg.backLabel;
  $('fc-back-text').textContent = cfg.getBack(testState.current);
  setHidden($('fc-back'), true);
  setHidden($('fc-buttons'), true);
  setHidden($('fc-tap-hint'), false);
}

function revealFlashcard() {
  if (testState.fcRevealed) return;
  testState.fcRevealed = true;
  setHidden($('fc-back'), false);
  setHidden($('fc-buttons'), false);
  setHidden($('fc-tap-hint'), true);
}

function dismissFlashcard(direction) {
  if (testState.fcAnimating || !testState.current) return;
  testState.fcAnimating = true;

  // direction: 'right' = correct, 'left' = wrong
  if (direction === 'right') testState.correct++;
  else testState.wrong++;

  // 履歴に保存
  fcHistory.push({ word: testState.current, direction });

  const flashcard = $('flashcard');
  const translateX = direction === 'right' ? '120%' : '-120%';
  flashcard.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
  flashcard.style.transform = `translateX(${translateX}) rotate(${direction === 'right' ? '10' : '-10'}deg)`;
  flashcard.style.opacity = '0';

  updateTestScore();

  setTimeout(() => {
    flashcard.style.transition = 'none';
    flashcard.style.transform = 'translateX(0) rotate(0)';
    flashcard.style.opacity = '1';
    setTimeout(() => {
      flashcard.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
      testState.fcAnimating = false;
      showNextFlashcard();
    }, 50);
  }, 300);
}

// 一つ前のカードに戻す
function undoFlashcard() {
  if (fcHistory.length === 0) return;
  const last = fcHistory.pop();

  // スコアを戻す
  if (last.direction === 'right') testState.correct--;
  else testState.wrong--;

  // 現在のカードをプールに戻す
  if (testState.current) {
    testState.pool.push(testState.current);
  }

  // 前のカードを表示
  testState.current = last.word;
  testState.fcRevealed = false;
  const flashcard = $('flashcard');
  flashcard.style.transition = 'none';
  renderFlashcard();
  updateFcUndoBtn();
  updateTestScore();

  // test-completeが表示されていた場合は戻す
  showTestPanels(['test-score', 'flashcard-area']);
}

function updateFcUndoBtn() {
  const btn = $('btn-fc-undo');
  const btnStandalone = $('btn-fc-undo-standalone');
  const hasHistory = fcHistory.length > 0;
  if (btn) setHidden(btn, !hasHistory);
  if (btnStandalone) setHidden(btnStandalone, !hasHistory);
}

// スワイプ操作
(function initSwipe() {
  let startX = 0, currentX = 0, isDragging = false;
  const flashcard = $('flashcard');

  flashcard.addEventListener('pointerdown', e => {
    if (testState.mode !== 'flashcard') return;
    isDragging = true;
    startX = e.clientX;
    currentX = 0;
    flashcard.style.transition = 'none';
    flashcard.setPointerCapture(e.pointerId);
  });

  flashcard.addEventListener('pointermove', e => {
    if (!isDragging) return;
    currentX = e.clientX - startX;
    const rotate = currentX * 0.05;
    flashcard.style.transform = `translateX(${currentX}px) rotate(${rotate}deg)`;
    flashcard.style.opacity = Math.max(0.5, 1 - Math.abs(currentX) / 300).toString();
  });

  flashcard.addEventListener('pointerup', e => {
    if (!isDragging) return;
    isDragging = false;
    flashcard.releasePointerCapture(e.pointerId);

    if (Math.abs(currentX) > 80) {
      dismissFlashcard(currentX > 0 ? 'right' : 'left');
    } else {
      flashcard.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
      flashcard.style.transform = '';
      flashcard.style.opacity = '1';
    }
    currentX = 0;
  });

  // タップで裏面を表示（スワイプでなかった場合のみ）
  flashcard.addEventListener('click', e => {
    if (Math.abs(currentX) > 5) return;
    if (!testState.fcRevealed && testState.mode === 'flashcard') {
      revealFlashcard();
    }
  });
})();

// --- 共通 ---
function showTestComplete() {
  showTestPanels(['test-complete', 'test-score']);
  const total = testState.correct + testState.wrong;
  const pct = total > 0 ? Math.round(testState.correct / total * 100) : 0;
  $('test-final-score').innerHTML =
    `${total}問中 <span class="text-green-600 font-bold">${testState.correct}問正解</span>（正答率 ${pct}%）`;
}

function updateTestScore() {
  $('score-correct').textContent = testState.correct;
  $('score-wrong').textContent = testState.wrong;
  $('score-remaining').textContent = testState.pool.length;
}

// テストモードイベント
$('btn-test-mode').addEventListener('click', enterTestMode);
$('btn-exit-test').addEventListener('click', exitTestMode);
$('btn-flashcard-mode').addEventListener('click', enterFlashcardMode);
$('btn-writing-mode').addEventListener('click', enterWritingMode);
$('btn-answer').addEventListener('click', checkAnswer);
$('btn-next-question').addEventListener('click', showNextQuestion);
$('btn-restart-test').addEventListener('click', enterTestMode);
$('btn-fc-correct').addEventListener('click', () => dismissFlashcard('right'));
$('btn-fc-wrong').addEventListener('click', () => dismissFlashcard('left'));

// 記述式: 出題形式ボタン
document.querySelectorAll('.test-type-btn').forEach(btn => {
  btn.addEventListener('click', () => startTestWithType(btn.dataset.type));
});

// 単語カード: サブモード選択ボタン
document.querySelectorAll('.fc-type-btn').forEach(btn => {
  btn.addEventListener('click', () => startFlashcard(btn.dataset.fcType));
});

// Enterキーで回答
elements.answerInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const inputArea = $('test-input-area');
    const resultArea = $('test-result-area');
    if (!inputArea.classList.contains('hidden')) {
      checkAnswer();
    } else if (!resultArea.classList.contains('hidden')) {
      showNextQuestion();
    }
  }
});

// 単語カード: キーボード操作
document.addEventListener('keydown', e => {
  const isFlashcardVisible = testState.active &&
    testState.mode === 'flashcard' &&
    !$('flashcard-area').classList.contains('hidden');

  if (!isFlashcardVisible || e.repeat) return;

  if (e.key === 'Enter') {
    e.preventDefault();
    revealFlashcard();
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    dismissFlashcard('right');
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    dismissFlashcard('left');
  }
});

// ===== 初期化 =====
const wordsReady = initWords();

// ===== Service Worker 登録 =====
let serviceWorkerRegistration = null;
let lastUpdateCheck = 0;

async function checkForAppUpdates() {
  const now = Date.now();
  if (now - lastUpdateCheck < 5000) return;
  lastUpdateCheck = now;

  await wordsReady;
  await refreshWords();
  if (serviceWorkerRegistration) {
    serviceWorkerRegistration.update().catch(err => {
      console.warn('Service Workerの更新確認に失敗:', err);
    });
  }
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') checkForAppUpdates();
});
window.addEventListener('focus', checkForAppUpdates);
window.addEventListener('pageshow', checkForAppUpdates);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js', { updateViaCache: 'none' })
      .then(reg => {
        serviceWorkerRegistration = reg;
        console.log('SW registered:', reg.scope);
        // 新しいSWがあれば即座にアクティベート
        reg.addEventListener('updatefound', () => {
          const newSW = reg.installing;
          newSW.addEventListener('statechange', () => {
            if (newSW.state === 'activated') {
              // 新しいSWがアクティブになったらリロードして最新を反映
              window.location.reload();
            }
          });
        });
      })
      .catch(err => console.log('SW registration failed:', err));
  });
}
