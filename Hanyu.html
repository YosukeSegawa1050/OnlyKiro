<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>中国語単語帳</title>
<link rel="manifest" href="./manifest.json"/>
<meta name="theme-color" content="#2563eb"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="中国語単語帳"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #f8fafc; }
  .card-enter { animation: cardIn 0.3s ease forwards; }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body class="min-h-screen py-8 px-4">

<!-- ===== ヘッダー ===== -->
<div class="max-w-2xl mx-auto mb-8 text-center">
  <h1 class="text-3xl font-bold text-gray-800 tracking-wide">📖 中国語単語帳</h1>
  <p class="text-sm text-gray-500 mt-1">単語を登録して、発音を確認しよう</p>
</div>

<!-- ===== 入力フォーム ===== -->
<div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-lg p-6 mb-8">

  <!-- AI自動入力セクション -->
  <div class="mb-5 p-4 bg-gradient-to-r from-purple-50 to-blue-50 rounded-xl border border-purple-100">
    <label for="inp-japanese" class="text-xs font-semibold text-purple-600 block mb-1.5">🤖 日本語から自動入力</label>
    <div class="flex gap-2">
      <input id="inp-japanese" type="text" placeholder="例：こんにちは、学校、食べる"
             class="flex-1 border border-purple-200 rounded-lg px-3 py-2 text-base focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent transition"/>
      <button id="btn-ai"
              class="px-4 py-2 bg-purple-600 hover:bg-purple-500 text-white font-bold rounded-lg shadow transition active:scale-95 whitespace-nowrap disabled:opacity-50 disabled:cursor-not-allowed">
        ✨ AI自動入力
      </button>
    </div>
    <div id="ai-msg" class="mt-2 text-xs text-purple-500 hidden"></div>
    <div id="ai-key-section" class="mt-3">
      <details class="text-xs text-gray-500">
        <summary class="cursor-pointer hover:text-purple-600 transition">⚙️ Gemini APIキーを設定</summary>
        <div class="mt-2 flex gap-2">
          <input id="inp-apikey" type="password" placeholder="AIza..."
                 class="flex-1 border border-gray-200 rounded px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-purple-300"/>
          <button id="btn-save-key"
                  class="px-3 py-1 bg-gray-700 hover:bg-gray-600 text-white text-xs rounded transition">保存</button>
        </div>
        <p class="mt-1 text-gray-400">キーはlocalStorageに保存されます。Google Gemini APIへの送信のみに使用されます。</p>
      </details>
    </div>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-4">
    <!-- 漢字 -->
    <div class="flex flex-col gap-1">
      <label for="inp-hanzi" class="text-xs font-semibold text-gray-500">漢字（単語）</label>
      <input id="inp-hanzi" type="text" placeholder="例：你好"
             class="border border-gray-300 rounded-lg px-3 py-2 text-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition"/>
    </div>
    <!-- ピンイン -->
    <div class="flex flex-col gap-1">
      <label for="inp-pinyin" class="text-xs font-semibold text-gray-500">ピンイン</label>
      <input id="inp-pinyin" type="text" placeholder="例：nǐ hǎo"
             class="border border-gray-300 rounded-lg px-3 py-2 text-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition"/>
    </div>
    <!-- 意味 -->
    <div class="flex flex-col gap-1">
      <label for="inp-meaning" class="text-xs font-semibold text-gray-500">意味</label>
      <input id="inp-meaning" type="text" placeholder="例：こんにちは"
             class="border border-gray-300 rounded-lg px-3 py-2 text-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition"/>
    </div>
  </div>
  <div class="flex justify-end">
    <button id="btn-save"
            class="px-6 py-2 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg shadow transition active:scale-95">
      保存
    </button>
  </div>
  <div id="form-msg" class="mt-2 text-sm text-red-500 hidden"></div>
</div>

<!-- ===== モード切替・検索・件数 ===== -->
<div class="max-w-2xl mx-auto flex items-center justify-between mb-4 px-1">
  <div class="flex items-center gap-2">
    <input id="inp-search" type="text" placeholder="🔍 検索..."
           class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 w-48 transition"/>
    <button id="btn-test-mode"
            class="px-4 py-1.5 bg-amber-500 hover:bg-amber-400 text-white text-sm font-bold rounded-lg shadow transition active:scale-95">
      📝 テストモード
    </button>
  </div>
  <span id="word-count" class="text-xs text-gray-400">0 件</span>
</div>

<!-- ===== 単語帳モード（通常画面） ===== -->
<div id="wordbook-mode">

<!-- ===== 単語カード一覧 ===== -->
<div id="card-list" class="max-w-2xl mx-auto grid grid-cols-1 sm:grid-cols-2 gap-4">
  <!-- カードはJSで動的生成 -->
</div>

<!-- 空状態 -->
<div id="empty-state" class="max-w-2xl mx-auto text-center py-16 hidden">
  <p class="text-gray-400 text-lg">まだ単語が登録されていません</p>
  <p class="text-gray-300 text-sm mt-1">上のフォームから単語を追加しましょう</p>
</div>

</div><!-- /wordbook-mode -->

<!-- ===== テストモード ===== -->
<div id="test-mode" class="hidden max-w-2xl mx-auto">
  <div class="bg-white rounded-2xl shadow-lg p-8 flex flex-col items-center gap-6">
    <!-- ヘッダー -->
    <div class="flex items-center justify-between w-full">
      <h2 class="text-lg font-bold text-amber-600">📝 テストモード</h2>
      <button id="btn-exit-test"
              class="px-4 py-1.5 bg-gray-200 hover:bg-gray-300 text-gray-700 text-sm font-bold rounded-lg transition">
        ← 単語帳に戻る
      </button>
    </div>

    <!-- スコア表示 -->
    <div id="test-score" class="flex gap-6 text-sm text-gray-500">
      <span>正解: <span id="score-correct" class="font-bold text-green-600">0</span></span>
      <span>不正解: <span id="score-wrong" class="font-bold text-red-500">0</span></span>
      <span>残り: <span id="score-remaining" class="font-bold text-gray-700">0</span></span>
    </div>

    <!-- 出題形式選択 -->
    <div id="test-type-select" class="w-full flex flex-col items-center gap-2">
      <p class="text-xs text-gray-400">出題形式を選んでください</p>
      <div class="flex flex-wrap gap-2 justify-center">
        <button data-type="meaning-to-hanzi" class="test-type-btn px-4 py-2 rounded-lg border-2 border-amber-400 bg-amber-50 text-amber-700 text-sm font-bold transition hover:bg-amber-100">
          日本語 → 中国語
        </button>
        <button data-type="hanzi-to-meaning" class="test-type-btn px-4 py-2 rounded-lg border-2 border-green-400 bg-green-50 text-green-700 text-sm font-bold transition hover:bg-green-100">
          中国語 → 日本語
        </button>
        <button data-type="pinyin-to-hanzi" class="test-type-btn px-4 py-2 rounded-lg border-2 border-purple-400 bg-purple-50 text-purple-700 text-sm font-bold transition hover:bg-purple-100">
          ピンイン → 中国語
        </button>
        <button data-type="hanzi-to-pinyin" class="test-type-btn px-4 py-2 rounded-lg border-2 border-teal-400 bg-teal-50 text-teal-700 text-sm font-bold transition hover:bg-teal-100">
          中国語 → ピンイン
        </button>
      </div>
    </div>

    <!-- 問題表示 -->
    <div id="test-question-area" class="hidden w-full text-center py-6">
      <p id="test-question-label" class="text-sm text-gray-400 mb-2">以下の日本語を中国語に翻訳してください</p>
      <div id="test-question" class="text-3xl font-black text-gray-800"></div>
    </div>

    <!-- 回答入力 -->
    <div id="test-input-area" class="w-full flex flex-col items-center gap-3">
      <input id="inp-answer" type="text" placeholder="中国語（漢字）を入力..."
             class="w-full max-w-xs border-2 border-amber-300 rounded-xl px-4 py-3 text-xl text-center focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent transition"/>
      <button id="btn-answer"
              class="px-8 py-2.5 bg-amber-500 hover:bg-amber-400 text-white font-bold rounded-xl shadow transition active:scale-95">
        回答する
      </button>
    </div>

    <!-- 結果表示 -->
    <div id="test-result-area" class="hidden w-full flex flex-col items-center gap-4">
      <div id="test-result-msg" class="text-xl font-bold"></div>
      <div id="test-result-detail" class="text-sm text-gray-500 bg-gray-50 rounded-xl p-4 w-full max-w-xs text-center"></div>
      <button id="btn-next-question"
              class="px-8 py-2.5 bg-blue-500 hover:bg-blue-400 text-white font-bold rounded-xl shadow transition active:scale-95">
        次の問題 →
      </button>
    </div>

    <!-- 単語不足メッセージ -->
    <div id="test-empty" class="hidden text-center py-8">
      <p class="text-gray-400 text-lg">テストに使える単語がありません</p>
      <p class="text-gray-300 text-sm mt-1">まず単語帳に単語を登録してください</p>
    </div>

    <!-- テスト完了 -->
    <div id="test-complete" class="hidden text-center py-8">
      <p class="text-2xl font-bold text-amber-600">🎉 テスト完了！</p>
      <div id="test-final-score" class="mt-3 text-base text-gray-600"></div>
      <button id="btn-restart-test"
              class="mt-4 px-6 py-2 bg-amber-500 hover:bg-amber-400 text-white font-bold rounded-xl shadow transition">
        もう一度テスト
      </button>
    </div>
  </div>
</div>

<script>
'use strict';

/* ============================================================
   中国語単語帳アプリ
   - localStorage によるデータ永続化
   - Web Speech API による中国語読み上げ
   ============================================================ */

// ===== データ管理 =====
const STORAGE_KEY = 'hanyu_wordbook';

function loadWords() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    return [];
  }
}

function saveWords(words) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
}

let words = loadWords();

// ===== 描画 =====
function render(filter = '') {
  const list = document.getElementById('card-list');
  const empty = document.getElementById('empty-state');
  const countEl = document.getElementById('word-count');
  list.innerHTML = '';

  const filtered = filter
    ? words.filter(w =>
        w.hanzi.includes(filter) ||
        w.pinyin.toLowerCase().includes(filter.toLowerCase()) ||
        w.meaning.includes(filter)
      )
    : words;

  countEl.textContent = `${filtered.length} 件`;

  if (filtered.length === 0) {
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  filtered.forEach((word, idx) => {
    const card = document.createElement('div');
    card.className = 'card-enter bg-white rounded-xl shadow-md p-5 flex flex-col gap-2 relative group';

    card.innerHTML = `
      <div class="flex items-start justify-between">
        <div>
          <div class="text-2xl font-bold text-gray-800 leading-tight">${escapeHtml(word.hanzi)}</div>
          <div class="text-sm text-blue-500 font-medium mt-0.5">${escapeHtml(word.pinyin)}</div>
        </div>
        <button class="btn-delete opacity-0 group-hover:opacity-100 transition text-gray-300 hover:text-red-400 text-lg" data-idx="${idx}" title="削除">
          ✕
        </button>
      </div>
      <div class="text-sm text-gray-600 border-t border-gray-100 pt-2">${escapeHtml(word.meaning)}</div>
      <div class="flex justify-end mt-1">
        <button class="btn-speak px-3 py-1 bg-green-50 hover:bg-green-100 text-green-700 text-xs font-bold rounded-lg border border-green-200 transition active:scale-95"
                data-hanzi="${escapeAttr(word.hanzi)}">
          🔊 発音する
        </button>
      </div>
    `;
    list.appendChild(card);
  });

  // イベント委譲
  list.querySelectorAll('.btn-speak').forEach(btn => {
    btn.addEventListener('click', () => speak(btn.dataset.hanzi));
  });
  list.querySelectorAll('.btn-delete').forEach(btn => {
    btn.addEventListener('click', () => {
      if (confirm('この単語を削除しますか？')) {
        deleteWord(parseInt(btn.dataset.idx));
      }
    });
  });
}

// ===== 単語追加 =====
function addWord(hanzi, pinyin, meaning) {
  words.unshift({ hanzi, pinyin, meaning, created: Date.now() });
  saveWords(words);
  render(document.getElementById('inp-search').value);
}

// ===== 単語削除 =====
function deleteWord(idx) {
  words.splice(idx, 1);
  saveWords(words);
  render(document.getElementById('inp-search').value);
}

// ===== 発音（Web Speech API） =====
function speak(text) {
  if (!('speechSynthesis' in window)) {
    alert('このブラウザは音声合成に対応していません。');
    return;
  }
  // 既に再生中なら停止
  window.speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'zh-CN';
  utterance.rate = 0.85; // ゆっくりめ
  utterance.pitch = 1;

  // 中国語の音声を優先的に選択
  const voices = window.speechSynthesis.getVoices();
  const zhVoice = voices.find(v => v.lang === 'zh-CN') ||
                  voices.find(v => v.lang.startsWith('zh'));
  if (zhVoice) utterance.voice = zhVoice;

  window.speechSynthesis.speak(utterance);
}

// 音声リスト読み込み（非同期の場合に対応）
if ('speechSynthesis' in window) {
  window.speechSynthesis.onvoiceschanged = () => {};
}

// ===== ユーティリティ =====
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escapeAttr(str) {
  return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== イベント =====
document.getElementById('btn-save').addEventListener('click', () => {
  const hanzi   = document.getElementById('inp-hanzi').value.trim();
  const pinyin  = document.getElementById('inp-pinyin').value.trim();
  const meaning = document.getElementById('inp-meaning').value.trim();
  const msg     = document.getElementById('form-msg');

  if (!hanzi) {
    msg.textContent = '漢字（単語）を入力してください。';
    msg.classList.remove('hidden');
    return;
  }
  if (!pinyin && !meaning) {
    msg.textContent = 'ピンインか意味のどちらかを入力してください。';
    msg.classList.remove('hidden');
    return;
  }
  msg.classList.add('hidden');

  addWord(hanzi, pinyin, meaning);

  // フォームクリア
  document.getElementById('inp-hanzi').value = '';
  document.getElementById('inp-pinyin').value = '';
  document.getElementById('inp-meaning').value = '';
  document.getElementById('inp-hanzi').focus();
});

// Enterキーで保存
['inp-hanzi','inp-pinyin','inp-meaning'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-save').click();
  });
});

// 検索
document.getElementById('inp-search').addEventListener('input', e => {
  render(e.target.value.trim());
});

// ===== AI自動入力（Google Gemini API） =====
const APIKEY_STORAGE = 'hanyu_gemini_key';

function getApiKey() {
  return localStorage.getItem(APIKEY_STORAGE) || '';
}

document.getElementById('btn-save-key').addEventListener('click', () => {
  const key = document.getElementById('inp-apikey').value.trim();
  if (key) {
    localStorage.setItem(APIKEY_STORAGE, key);
    document.getElementById('inp-apikey').value = '';
    document.getElementById('inp-apikey').placeholder = '設定済み（' + key.slice(0,7) + '...）';
    showAiMsg('APIキーを保存しました。', 'text-green-600');
  }
});

// APIキーがあれば入力欄にマスク表示
(function() {
  const k = getApiKey();
  if (k) document.getElementById('inp-apikey').placeholder = '設定済み（' + k.slice(0,7) + '...）';
})();

document.getElementById('btn-ai').addEventListener('click', async () => {
  const japanese = document.getElementById('inp-japanese').value.trim();
  if (!japanese) {
    showAiMsg('日本語の単語を入力してください。', 'text-red-500');
    return;
  }

  const apiKey = getApiKey();
  if (!apiKey) {
    showAiMsg('⚙️ Gemini APIキーを設定してください（下の設定を開く）。', 'text-red-500');
    return;
  }

  const btn = document.getElementById('btn-ai');
  btn.disabled = true;
  btn.textContent = '⏳ 取得中...';
  showAiMsg('Gemini APIに問い合わせ中...', 'text-purple-500');

  try {
    const result = await fetchTranslation(japanese, apiKey);
    if (result) {
      document.getElementById('inp-hanzi').value   = result.hanzi   || '';
      document.getElementById('inp-pinyin').value  = result.pinyin  || '';
      document.getElementById('inp-meaning').value = result.meaning || japanese;
      showAiMsg(`✅ 「${result.hanzi}」(${result.pinyin}) を自動入力しました。`, 'text-green-600');
    }
  } catch (err) {
    showAiMsg('❌ エラー: ' + err.message, 'text-red-500');
  } finally {
    btn.disabled = false;
    btn.textContent = '✨ AI自動入力';
  }
});

// Enterキーでも実行
document.getElementById('inp-japanese').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-ai').click();
});

async function fetchTranslation(japanese, apiKey) {
  const prompt = `以下の日本語を中国語に翻訳し、JSON形式のみで回答してください。他の説明は一切不要です。

日本語: "${japanese}"

回答フォーマット（必ずこの形式のJSONのみ）:
{"hanzi":"中国語の漢字","pinyin":"ピンイン（声調符号付き）","meaning":"${japanese}"}`;

  // Gemini API エンドポイント（v1beta / gemini-2.0-flash）
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;

  const response = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{
        parts: [{ text: prompt }]
      }],
      generationConfig: {
        temperature: 0.2,
        maxOutputTokens: 200,
      },
    }),
  });

  if (!response.ok) {
    const errData = await response.json().catch(() => ({}));
    const errMsg = errData.error?.message || `HTTP ${response.status}`;
    throw new Error(errMsg);
  }

  const data = await response.json();

  // Gemini のレスポンスからテキストを抽出
  const content = data.candidates?.[0]?.content?.parts?.[0]?.text || '';

  // JSONを抽出（```json ... ``` に包まれている場合にも対応）
  const jsonMatch = content.match(/\{[\s\S]*?\}/);
  if (!jsonMatch) throw new Error('APIからの応答を解析できませんでした。');

  const parsed = JSON.parse(jsonMatch[0]);
  return {
    hanzi:   parsed.hanzi   || parsed.chinese || '',
    pinyin:  parsed.pinyin  || '',
    meaning: parsed.meaning || parsed.japanese || japanese,
  };
}

function showAiMsg(text, colorClass) {
  const el = document.getElementById('ai-msg');
  el.textContent = text;
  el.className = `mt-2 text-xs ${colorClass}`;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 5000);
}

// ===== テストモード =====
let testState = {
  active: false,
  pool: [],       // 出題プール（シャッフル済み）
  current: null,  // 現在の問題
  correct: 0,
  wrong: 0,
  type: null,     // 'meaning-to-hanzi' | 'pinyin-to-meaning' | 'pinyin-to-hanzi'
};

// 出題形式の設定
const TEST_TYPES = {
  'meaning-to-hanzi': {
    label: '以下の日本語を中国語（漢字）で答えてください',
    placeholder: '中国語（漢字）を入力...',
    getQuestion: w => w.meaning || '(意味未登録)',
    getAnswer: w => w.hanzi,
  },
  'pinyin-to-hanzi': {
    label: '以下のピンインを中国語（漢字）で答えてください',
    placeholder: '中国語（漢字）を入力...',
    getQuestion: w => w.pinyin || '(ピンイン未登録)',
    getAnswer: w => w.hanzi,
  },
  'hanzi-to-pinyin': {
    label: '以下の中国語のピンインを答えてください',
    placeholder: 'ピンインを入力...',
    getQuestion: w => w.hanzi || '(漢字未登録)',
    getAnswer: w => w.pinyin,
  },
  'hanzi-to-meaning': {
    label: '以下の中国語の日本語の意味を答えてください',
    placeholder: '日本語の意味を入力...',
    getQuestion: w => w.hanzi || '(漢字未登録)',
    getAnswer: w => w.meaning,
  },
};

function enterTestMode() {
  const allWords = loadWords();

  // テスト画面表示
  document.getElementById('test-mode').classList.remove('hidden');
  document.getElementById('wordbook-mode').classList.add('hidden');

  if (allWords.length === 0) {
    document.getElementById('test-empty').classList.remove('hidden');
    document.getElementById('test-type-select').classList.add('hidden');
    document.getElementById('test-question-area').classList.add('hidden');
    document.getElementById('test-input-area').classList.add('hidden');
    document.getElementById('test-result-area').classList.add('hidden');
    document.getElementById('test-complete').classList.add('hidden');
    document.getElementById('test-score').classList.add('hidden');
    testState.active = true;
    return;
  }

  // 出題形式選択画面を表示
  document.getElementById('test-empty').classList.add('hidden');
  document.getElementById('test-complete').classList.add('hidden');
  document.getElementById('test-question-area').classList.add('hidden');
  document.getElementById('test-input-area').classList.add('hidden');
  document.getElementById('test-result-area').classList.add('hidden');
  document.getElementById('test-type-select').classList.remove('hidden');
  document.getElementById('test-score').classList.add('hidden');
  testState.active = true;
}

function startTestWithType(type) {
  const allWords = loadWords();
  testState.type = type;
  testState.pool = shuffleArray([...allWords]);
  testState.correct = 0;
  testState.wrong = 0;

  document.getElementById('test-type-select').classList.add('hidden');
  document.getElementById('test-score').classList.remove('hidden');

  updateTestScore();
  showNextQuestion();
}

function exitTestMode() {
  testState.active = false;
  testState.type = null;
  document.getElementById('test-mode').classList.add('hidden');
  document.getElementById('wordbook-mode').classList.remove('hidden');
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function showNextQuestion() {
  if (testState.pool.length === 0) {
    showTestComplete();
    return;
  }
  testState.current = testState.pool.pop();
  const cfg = TEST_TYPES[testState.type];

  document.getElementById('test-question-label').textContent = cfg.label;
  document.getElementById('test-question').textContent = cfg.getQuestion(testState.current);
  document.getElementById('inp-answer').placeholder = cfg.placeholder;

  document.getElementById('test-question-area').classList.remove('hidden');
  document.getElementById('test-input-area').classList.remove('hidden');
  document.getElementById('test-result-area').classList.add('hidden');
  document.getElementById('inp-answer').value = '';
  document.getElementById('inp-answer').focus();
  updateTestScore();
}

function checkAnswer() {
  const userAnswer = document.getElementById('inp-answer').value.trim();
  if (!userAnswer) return;

  const cfg = TEST_TYPES[testState.type];
  const correctAnswer = cfg.getAnswer(testState.current);
  const isCorrect = userAnswer === correctAnswer;

  if (isCorrect) {
    testState.correct++;
    document.getElementById('test-result-msg').textContent = '🎉 正解！';
    document.getElementById('test-result-msg').className = 'text-xl font-bold text-green-600';
  } else {
    testState.wrong++;
    document.getElementById('test-result-msg').textContent = '❌ 不正解';
    document.getElementById('test-result-msg').className = 'text-xl font-bold text-red-500';
  }

  document.getElementById('test-result-detail').innerHTML = `
    <div class="text-xs text-gray-400 mb-1">正解</div>
    <div class="text-lg font-bold text-gray-800">${escapeHtml(correctAnswer)}</div>
    <div class="mt-2 text-xs text-gray-400">この単語の情報</div>
    <div class="text-base font-bold text-gray-700">${escapeHtml(testState.current.hanzi)}</div>
    <div class="text-sm text-blue-500">${escapeHtml(testState.current.pinyin)}</div>
    <div class="text-xs text-gray-500">${escapeHtml(testState.current.meaning)}</div>
    ${!isCorrect ? `<div class="mt-2 text-xs text-red-400">あなたの回答: ${escapeHtml(userAnswer)}</div>` : ''}
  `;

  document.getElementById('test-input-area').classList.add('hidden');
  document.getElementById('test-result-area').classList.remove('hidden');
  updateTestScore();

  // 結果表示後にページ最下部へスクロール
  setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 100);
}

function showTestComplete() {
  document.getElementById('test-question-area').classList.add('hidden');
  document.getElementById('test-input-area').classList.add('hidden');
  document.getElementById('test-result-area').classList.add('hidden');
  document.getElementById('test-complete').classList.remove('hidden');

  const total = testState.correct + testState.wrong;
  const pct = total > 0 ? Math.round(testState.correct / total * 100) : 0;
  document.getElementById('test-final-score').innerHTML =
    `${total}問中 <span class="text-green-600 font-bold">${testState.correct}問正解</span>（正答率 ${pct}%）`;
}

function updateTestScore() {
  document.getElementById('score-correct').textContent = testState.correct;
  document.getElementById('score-wrong').textContent = testState.wrong;
  document.getElementById('score-remaining').textContent = testState.pool.length;
}

// テストモードイベント
document.getElementById('btn-test-mode').addEventListener('click', enterTestMode);
document.getElementById('btn-exit-test').addEventListener('click', exitTestMode);
document.getElementById('btn-answer').addEventListener('click', checkAnswer);
document.getElementById('btn-next-question').addEventListener('click', showNextQuestion);
document.getElementById('btn-restart-test').addEventListener('click', enterTestMode);

// 出題形式ボタン
document.querySelectorAll('.test-type-btn').forEach(btn => {
  btn.addEventListener('click', () => startTestWithType(btn.dataset.type));
});

// Enterキーで回答
document.getElementById('inp-answer').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (!document.getElementById('test-input-area').classList.contains('hidden')) {
      checkAnswer();
    } else if (!document.getElementById('test-result-area').classList.contains('hidden')) {
      showNextQuestion();
    }
  }
});

// ===== 初期描画 =====
render();

// ===== Service Worker 登録 =====
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW registration failed:', err));
  });
}
</script>
</body>
</html>
